<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SANTOS MAFIA | Recruitment</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="card">

<h1>SANTOS MAFIA</h1>

<p class="subtitle">

Recruitment Application

</p>

<p class="desc">

Only serious players should apply.

</p>

<form id="form">

<input type="text" placeholder="One State Nickname" required>

<input type="text" placeholder="Discord Username" required>

<input type="number" placeholder="Age (16+)" min="16" required>

<input type="text" placeholder="Country" required>

<input type="text" placeholder="Time Zone" required>

<input type="number" placeholder="Current Level" required>

<input type="number" placeholder="AK Level" required>

<select required>

<option value="">Do you have a microphone?</option>

<option>Yes</option>

<option>No</option>

</select>

<select required>

<option value="">Daily Activity</option>

<option>2-4 Hours</option>

<option>4-6 Hours</option>

<option>6+ Hours</option>

</select>

<select id="previousGang">

<option>No</option>

<option>Yes</option>

</select>

<input

type="text"

id="gangName"

placeholder="Previous Gang Name"

style="display:none;">

<textarea

placeholder="Why do you want to join SANTOS MAFIA?"

rows="5"

required>

</textarea>

<label class="checkbox">

<input type="checkbox" required>

I agree to follow all SANTOS MAFIA rules.

</label>

<button>

SUBMIT APPLICATION

</button>

</form>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
